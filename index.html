<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <meta name='description' content="私人日记本">
    <meta name='keywords' content="日记,私人日记,Markdown 日记,生活记录">

    <!-- web app -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- theme color-->
    <meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

    <!-- fav icon -->
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">

    <!-- apple-touch-icon -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <!-- mask-icon 目前非必须 -->
    <link rel="mask-icon" href="./logo.png">

    <title>日记</title>
    <link rel="preconnect" href="https://cn-font.claude-code-best.win" crossorigin>
    <link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/lywkpmydb/dist/LXGWWenKaiScreen/result.css">
    <link rel="stylesheet" href="https://cn-font.claude-code-best.win/packages/xuandongkaishu/dist/XuandongKaishu/result.css">
    <link rel="stylesheet" href="/preloading.css">
</head>
<body>

<!--加载动画-->
<div class="preloading">
    <div class="preloading-brand">
        <div class="logo-preloading">
            <img src="/logo.png" alt="日记">
        </div>
        <div class="preloading-name">日记</div>
    </div>
    <div class="preloading-track">
        <div class="preloading-progress"></div>
    </div>
    <div class="preloading-title">Loading</div>
</div>


<noscript>
    <strong>请开启 JavaScript，否则日记无法正常工作。</strong>
</noscript>
<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
</body>
<script>
    document.querySelector('.preloading').style.height = `${innerHeight}px`
</script>
</html>
